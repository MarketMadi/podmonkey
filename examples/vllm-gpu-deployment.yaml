apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
      annotations:
        podmonkey.io/model: llama-3.3-70b
        podmonkey.io/quantization: Q4_K_M
        podmonkey.io/context-length: "4096"
        podmonkey.io/concurrent-users: "1"
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.0
          resources:
            requests:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
