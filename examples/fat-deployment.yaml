apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: myorg/api:latest
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
        - name: sidecar
          image: fluent/fluent-bit
---
apiVersion: v1
kind: Service
metadata:
  name: api-lb
  namespace: production
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 443
